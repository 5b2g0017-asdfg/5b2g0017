<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人網站</title>
    <style>
        :root {
            --rimuru-blue: #a0d8ef;
            --deep-space: #0a0f1d;
            --box-gap: 20px;
            --text-gap: 8px;
            --icon-size: 100px;
        }

        body {
            margin: 0;
            background-color: var(--deep-space);
            color: #fff;
            font-family: 'Orbitron', 'PingFang TC', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a2a4a 0%, #0a0f1d 100%);
        }

        .wrapper {
            position: relative;
            width: 100%; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* --- 改進的動畫系統 --- */
        .page-section {
            display: none;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            width: 100%; height: 100%;
            position: absolute;
            box-sizing: border-box;
        }

        /* 當 active 類別被加入時，觸發動畫 */
        .page-section.active {
            opacity: 1;
            transform: scale(1);
        }

        /* --- 初始啟動頁面 --- */
        #init-page { flex-direction: column; justify-content: center; align-items: center; }
        .rimuru-core {
            width: 160px; height: 130px;
            background: linear-gradient(135deg, #a0d8ef 0%, #3498db 100%);
            border-radius: 50% 50% 45% 45% / 65% 65% 35% 35%;
            margin-bottom: 30px;
            box-shadow: 0 0 50px var(--rimuru-blue);
            animation: slimeFloat 4s infinite ease-in-out;
        }
        @keyframes slimeFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .btn-main {
            background: transparent; border: 2px solid var(--rimuru-blue);
            color: var(--rimuru-blue); padding: 18px 50px; font-weight: bold;
            cursor: pointer; border-radius: 50px; letter-spacing: 3px;
            transition: all 0.3s ease;
        }
        .btn-main:hover { background-color: var(--rimuru-blue); color: var(--deep-space); transform: scale(1.05); }

        /* --- 四方塊選單 (Grid) --- */
        #menu-grid {
            grid-template-columns: repeat(2, 300px); 
            grid-template-rows: repeat(2, 280px); 
            column-gap: 35px;
            row-gap: 15px;
            justify-content: center; 
            align-content: center;
        }

        .menu-box {
            background: rgba(10, 15, 29, 0.7);
            border: 1px solid rgba(160, 216, 239, 0.2);
            border-radius: 20px; 
            backdrop-filter: blur(8px);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
            padding: 30px;
            gap: var(--box-gap);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .menu-box:hover {
            background: rgba(160, 216, 239, 0.15); 
            border-color: var(--rimuru-blue); 
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(160, 216, 239, 0.4);
        }

        .box-icon { width: var(--icon-size); height: var(--icon-size); display: flex; justify-content: center; align-items: center; transition: transform 0.3s ease; }
        .box-icon img { width: 100%; height: 100%; object-fit: contain; }
        .menu-box:hover .box-icon { transform: scale(1.1); }

        .text-content { display: flex; flex-direction: column; align-items: center; gap: var(--text-gap); text-align: center; }
        .tag { font-size: 0.8rem; color: var(--rimuru-blue); opacity: 0.6; letter-spacing: 2px; }
        h3 { font-size: 1.6rem; margin: 0; letter-spacing: 4px; font-weight: bold; }

        /* --- 詳細頁面 (Flex) --- */
        #detail-section { justify-content: center; align-items: center; }
        .detail-page {
            width: 85%; height: 80%;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid var(--rimuru-blue);
            border-radius: 30px;
            padding: 50px;
            box-sizing: border-box;
            backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
            position: relative;
        }
        
        .detail-header h2 { font-size: 2.5rem; color: var(--rimuru-blue); margin: 0 0 20px 0; letter-spacing: 4px; }
        
        .close-btn {
            position: fixed; top: 30px; right: 30px;
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; border-radius: 50%; 
            cursor: pointer; display: flex; 
            justify-content: center; align-items: center;
            font-size: 1.8rem; z-index: 9999; 
            transition: all 0.3s ease;
        }
        .close-btn:hover { background: #ff4757; transform: rotate(90deg) scale(1.1); border-color: transparent; }

        /* --- 內容區域表格與文字 --- */
        table { width: 100%; border-spacing: 0 15px; }
        .clickable-td { 
            padding: 25px; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(160, 216, 239, 0.1);
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .clickable-td:hover {
            background: rgba(160, 216, 239, 0.15);
            border-color: var(--rimuru-blue);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(160, 216, 239, 0.2);
        }
        
        .simple-text { font-size: 1.2rem; line-height: 1.8; color: #fff; padding: 10px; }
        a { color: var(--rimuru-blue); text-decoration: none; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="wrapper">
        <section id="init-page" class="page-section active" style="display: flex;">
            <div class="rimuru-core"></div>
            <h2 style="letter-spacing: 8px; margin-bottom: 30px;">MY WEB</h2>
            <button class="btn-main" onclick="switchPage('menu-grid')">OPEN</button>
        </section>

        <section id="menu-grid" class="page-section">
            <button class="close-btn" onclick="switchPage('init-page')">×</button>
            <div class="menu-box" onclick="openDetail('status-win', '《作品》')">
                <div class="box-icon"><img src="images/analysis.gif" alt=""></div>
                <div class="text-content"><div class="tag">WORKS</div><h3>作品</h3></div>
            </div>
            <div class="menu-box" onclick="openDetail('nation-win', '《關於我》')">
                <div class="box-icon"><img src="images/archive.gif" alt=""></div>
                <div class="text-content"><div class="tag">ABOUT ME</div><h3>關於我</h3></div>
            </div>
            <div class="menu-box" onclick="openDetail('skill-win', '《聯絡方式》')">
                <div class="box-icon"><img src="images/ultimate.gif" alt=""></div>
                <div class="text-content"><div class="tag">CONTACT</div><h3>聯絡方式</h3></div>
            </div>
            <div class="menu-box" onclick="openDetail('memo-win', '《尚未完成》')">
                <div class="box-icon"><img src="images/memory.gif" alt=""></div>
                <div class="text-content"><div class="tag">COMING SOON</div><h3>尚未完成</h3></div>
            </div>
        </section>

        <section id="detail-section" class="page-section">
            <button class="close-btn" onclick="switchPage('menu-grid')">×</button>
            <div class="detail-page">
                <div class="detail-header"><h2 id="detail-title">系統訊息</h2></div>
                <div id="detail-content" style="flex-grow: 1; overflow-y: auto;"></div>
            </div>
        </section>
    </div>

    <template id="tpl-status-win">
        <table>
            <tr><td class="clickable-td">作品項目 01 - </td></tr>
            <tr><td class="clickable-td">作品項目 02 - </td></tr>
        </table>
    </template>

    <template id="tpl-nation-win">
        <div class="simple-text">
            <p><strong>姓名：</strong> 您的名字</p>
            <p>這裡已恢復為原本的排版，適合閱讀長篇文字。</p>
        </div>
    </template>

    <template id="tpl-skill-win">
        <table>
            <tr onclick="window.open('https://mail.google.com/mail/u/0/#inbox', '_blank')">
                <td class="clickable-td">
                    <strong>GMAIL</strong><br>5B2G0017@stust.edu.tw
                </td>
            </tr>
            <tr onclick="window.open('https://github.com/5b2g0017-asdfg', '_blank')">
                <td class="clickable-td">
                    <strong>GITHUB</strong><br>5b2g0017-asdfg
                </td>
            </tr>
        </table>
    </template>

    <template id="tpl-memo-win">
        <div class="simple-text">系統更新中，內容即將上線。</div>
    </template>

    <script>
        // 背景粒子
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if (p.x > canvas.width || p.x < 0 || p.y > canvas.height || p.y < 0) { p.x = Math.random() * canvas.width; p.y = Math.random() * canvas.height; }
                ctx.fillStyle = `rgba(160, 216, 239, ${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        initCanvas();
        for (let i = 0; i < 80; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2 + 1, speedX: Math.random() * 0.4 - 0.2, speedY: Math.random() * 0.4 - 0.2, opacity: Math.random() * 0.5 + 0.2 });
        animate();
        window.addEventListener('resize', initCanvas);

        // --- 優化的頁面切換：確保動畫播放完畢再更換狀態 ---
        function switchPage(pageId) {
            const allPages = document.querySelectorAll('.page-section');
            const target = document.getElementById(pageId);

            // 1. 先啟動舊頁面的淡出
            allPages.forEach(p => p.classList.remove('active'));

            // 2. 等待淡出動畫（約 300ms）後切換 display
            setTimeout(() => {
                allPages.forEach(p => p.style.display = 'none');
                
                // 3. 設定正確的排版模式
                target.style.display = (pageId === 'menu-grid') ? 'grid' : 'flex';

                // 4. 強制瀏覽器刷新佈局並淡入
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        target.classList.add('active');
                    });
                });
            }, 300);
        }

        function openDetail(dataId, titleText) {
            const contentArea = document.getElementById('detail-content');
            const template = document.getElementById('tpl-' + dataId);
            document.getElementById('detail-title').innerText = titleText;
            
            contentArea.innerHTML = '';
            contentArea.appendChild(template.content.cloneNode(true));

            switchPage('detail-section');
        }
    </script>
</body>
</html>
